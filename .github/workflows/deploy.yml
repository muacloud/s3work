name: Deploy Static Website

on:
  push:
    branches:
      - main  # 当你向 main 分支推送代码时触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 配置 AWS 凭证
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-east-1 # 换成你 S3 所在的区域

      # 3. 将文件同步到 S3
      # --delete 参数会删除 S3 中存在但本地仓库已删除的文件，保持完全一致
      - name: Deploy to S3
        run: |
          aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET }} --delete --exclude ".git/*" --exclude ".github/*"

      # 4. 刷新 CloudFront 缓存 (Invalidation)
      # 这一步至关重要，否则用户看到的还是 CDN 上的旧缓存
      - name: Create CloudFront Invalidation
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
